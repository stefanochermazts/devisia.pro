name: Auto-translate blog EN -> IT

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/content/blog/en/**"
      - "scripts/translate-blog-en-to-it.js"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: auto-translate-blog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Validate OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::Missing GitHub Actions secret OPENAI_API_KEY. Netlify env vars are not available to GitHub Actions."
            exit 1
          fi

      - name: Install dependencies
        # Translation script only needs gray-matter; avoid full npm ci (lockfile/Node drift).
        run: npm install gray-matter@4.0.3 --no-package-lock

      - name: Configure git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Detect changed EN posts
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ONLY="$(node scripts/audit-blog-translations.mjs --print-only-translate 2>/dev/null || true)"
            echo "only=$ONLY" >> "$GITHUB_OUTPUT"
            echo "mode=needs-translation (${ONLY:-none})"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "only=" >> "$GITHUB_OUTPUT"
            echo "mode=all (initial push)"
            exit 0
          fi

          mapfile -t CHANGED < <(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'src/content/blog/en/*.md' | sed 's|.*/||' | sed 's|\.md$||')
          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "only=" >> "$GITHUB_OUTPUT"
            echo "mode=none"
            exit 0
          fi

          ONLY=$(printf '%s,' "${CHANGED[@]}")
          ONLY="${ONLY%,}"
          echo "only=$ONLY" >> "$GITHUB_OUTPUT"
          echo "mode=changed (${#CHANGED[@]} post(s)): $ONLY"

      - name: Translate posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
          ONLY_TRANSLATE: ${{ steps.changed.outputs.only }}
          COMMIT_EACH: "1"
        run: node scripts/translate-blog-en-to-it.js

      - name: Commit remaining changes (if any)
        if: always()
        run: |
          git add -A src/content/blog/it
          if git diff --cached --quiet; then
            echo "No remaining changes to commit."
            exit 0
          fi
          git commit -m "auto: translate blog posts EN->IT (batch remainder)"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (non-fast-forward). Rebasing onto origin/main and retrying... (attempt ${attempt}/3)"
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Failed to push after 3 attempts."
          exit 1

